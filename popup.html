<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/main.css">
  <title data-i18n-mode="replace" data-resource="appName">Auto Vote Rating</title>
  <meta name="color-scheme" content="dark light">
  <style>
    :root {
      --bg: #0e1116;
      --surface: #141821;
      --text: #e9eef6;
      --muted: #a7b1c2;
      --brand: #4f8cff;
      --border: rgba(255, 255, 255, .08);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      width: 650px;
    }

    body {
      min-height: 440px;
    }

    #app {
      min-height: 440px;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script src="js/avrfw.umd.js" defer></script>
  <script src="modules/options-core.umd.js" defer></script>
  <script type="module" src="js/backend.service.js"></script>
  <script src="js/options.boot.js" defer></script>
</body>

</html>
